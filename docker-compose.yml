# EdgeOS Local PostgreSQL — bidirectional sync with Neon
#
# Architecture:
#   Neon → Local:  PostgreSQL logical replication (sub_from_neon)
#   Local → Neon:  Pull-based sync (sync-to-neon.py sidecar)
#
# No tunnel needed — the sync script initiates outbound connections to Neon.
#
# Usage:
#   docker compose up -d          # Start Postgres + sync sidecar
#   docker compose logs -f sync   # Watch sync logs
#   docker compose down            # Stop (data persists in ./data/postgres)
#   docker compose down -v         # Stop and DELETE all data
#
# Prerequisites:
#   - Copy .env.example to .env and fill in DB_URL and LOCAL_DB_URL
#   - Run: python scripts/migrate-local-db.py   (creates Agno schema)
#   - Run: bash scripts/setup-replication.sh     (configures replication)

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: edgeos-postgres
    restart: unless-stopped
    ports:
      # Use port 5433 on host to avoid conflict with Homebrew Postgres on 5432
      # Change LOCAL_PG_PORT in .env if you want a different port
      - "${LOCAL_PG_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${LOCAL_PG_USER:-edgeos}
      POSTGRES_PASSWORD: ${LOCAL_PG_PASSWORD:-edgeos_local}
      POSTGRES_DB: ${LOCAL_PG_DATABASE:-edgeos}
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
      - -c
      - listen_addresses=*
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-local-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LOCAL_PG_USER:-edgeos} -d ${LOCAL_PG_DATABASE:-edgeos}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  sync:
    build:
      context: .
      dockerfile: Dockerfile.sync
    container_name: edgeos-sync
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Connect to postgres service inside Docker network
      LOCAL_DB_URL: postgresql+psycopg://${LOCAL_PG_USER:-edgeos}:${LOCAL_PG_PASSWORD:-edgeos_local}@postgres:5432/${LOCAL_PG_DATABASE:-edgeos}
      DB_URL: ${DB_URL}
    # Sync every 5 seconds by default; override with SYNC_INTERVAL env var
    command: ["--loop", "--interval", "${SYNC_INTERVAL:-5}"]

volumes:
  pgdata:
    driver: local